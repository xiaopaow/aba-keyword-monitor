services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aba_keywords
      POSTGRES_USER: aba
      POSTGRES_PASSWORD: aba_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/src/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
